name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set branch protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';

            try {
              const { data: currentProtection } = await github.rest.repos.getBranchProtection({
                owner,
                repo,
                branch,
              });
              core.info('Branch protection already exists, updating...');
            } catch (e) {
              if (e.status === 404) {
                core.info('No existing protection, creating new...');
              }
            }

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: ['CI Passed']
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 0
              },
              restrictions: null,
              required_linear_history: true,
              required_conversation_resolution: true,
            });

            core.info('Branch protection rules set for main');
