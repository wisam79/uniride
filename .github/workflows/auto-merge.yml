name: Auto Merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    name: Auto Merge on CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Find PR with auto-merge label
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          if [ "$BRANCH" = "main" ]; then
            echo "Direct push to main — skipping auto-merge"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number,labels \
            --jq '.[] | select(.labels[].name == "auto-merge") | .number' \
            | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR with auto-merge label for branch $BRANCH"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "found=true" >> $GITHUB_OUTPUT
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUMBER with auto-merge label"

      - name: Wait for CI checks to settle
        if: steps.find-pr.outputs.found == 'true'
        run: sleep 10

      - name: Verify all CI checks passed
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.number }}"

          for i in 1 2 3; do
            STATUS=$(gh pr checks "$PR_NUMBER" 2>/dev/null || echo "failed")
            if ! echo "$STATUS" | grep -qi "fail\|pending\|neutral"; then
              echo "All checks passed for PR #$PR_NUMBER"
              exit 0
            fi
            echo "Attempt $i: checks still pending or failed, waiting..."
            sleep 15
          done

          echo "Checks did not pass after retries"
          exit 1

      - name: Merge Pull Request
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.number }}"
          echo "Auto-merging PR #$PR_NUMBER (squash)..."
          gh pr merge "$PR_NUMBER" \
            --squash \
            --subject "auto-merge: PR #$PR_NUMBER" \
            --delete-branch
          echo "PR #$PR_NUMBER merged successfully"
