name: Deploy to Supabase

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual deployment)"
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy Migrations & Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing"
            exit 1
          fi
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is missing"
            exit 1
          fi
          echo "Project ref: $PROJECT_REF"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push Database Migrations
        if: ${{ inputs.dry_run != true }}
        run: supabase db push

      - name: Dry Run - Check Migrations
        if: ${{ inputs.dry_run == true }}
        run: supabase db diff --schema public

      - name: Deploy Edge Functions
        if: ${{ inputs.dry_run != true }}
        run: |
          supabase functions deploy trip-engine --project-ref "$PROJECT_REF"
          supabase functions deploy send-notification --project-ref "$PROJECT_REF"
          supabase functions deploy zaincash-checkout --project-ref "$PROJECT_REF"
          supabase functions deploy zaincash-webhook --project-ref "$PROJECT_REF"

      - name: Set Edge Function Secrets
        if: ${{ inputs.dry_run != true }}
        run: |
          supabase secrets set \
            SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            ADMIN_URL="${{ secrets.ADMIN_URL }}" \
            ZAINCASH_SECRET="${{ secrets.ZAINCASH_SECRET }}" \
            ZAINCASH_MSISDN="${{ secrets.ZAINCASH_MSISDN }}" \
            ZAINCASH_MERCHANT_ID="${{ secrets.ZAINCASH_MERCHANT_ID }}" \
            --project-ref "$PROJECT_REF"

      - name: Verify Deployment
        if: ${{ inputs.dry_run != true }}
        run: |
          echo "Checking Edge Functions are active..."
          supabase functions list --project-ref "$PROJECT_REF"
