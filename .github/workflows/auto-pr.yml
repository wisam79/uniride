name: Auto PR

on:
  push:
    branches-ignore:
      - main
      - 'baseline/**'

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "PR #$EXISTING already exists for branch $BRANCH"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.exists == 'false'
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          COMMIT_MSG=$(git log -1 --format='%s')
          BODY="## Auto-generated PR

          Branch: \`${BRANCH}\`
          Latest commit: ${COMMIT_MSG}

          ---

          This PR will be auto-merged when CI passes."

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_MSG" \
            --body "$BODY")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Created PR #$PR_NUMBER: $PR_URL"

      - name: Add auto-merge label
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create.outputs.number }}"
          gh pr edit "$PR_NUMBER" --add-label "auto-merge"
          echo "Added auto-merge label to PR #$PR_NUMBER"
