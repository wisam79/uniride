name: UniRide Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uniride_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
        run: |
          pnpm db:migrate:test
          pnpm db:seed:test

      - name: Run Unit Tests (Logic & Constraints)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
          NODE_ENV: test
        run: pnpm test:unit

      - name: Run Security Tests (RLS & Auth)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-key
          NODE_ENV: test
        run: pnpm test:security

      - name: Run Concurrency Tests (Race Conditions)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
          NODE_ENV: test
        run: pnpm test:concurrency

      - name: Run Integration Tests (API & Triggers)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
          NODE_ENV: test
        run: pnpm test:integration

      - name: Run Edge Case Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_test
          NODE_ENV: test
        run: pnpm test:edge-cases

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uniride_perf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up performance test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_perf
        run: |
          pnpm db:migrate:test
          pnpm db:seed:performance

      - name: Run Performance Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uniride_perf
          NODE_ENV: test
        run: pnpm test:performance

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            performance-results/
            benchmarks/

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - name: Run SQL Injection Scan
        run: |
          echo "Running SQL injection vulnerability scan..."
          # Add SQLMap or similar tool integration here
          
      - name: Run Dependency Audit
        run: pnpm audit --audit-level=high

      - name: Check for Hardcoded Secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -r "password\|secret\|key" --include="*.ts" --include="*.js" src/ || true
